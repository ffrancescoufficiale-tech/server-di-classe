<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appunti del Dio Informatico</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { color: #cba6f7; margin-bottom: 5px; }
        .back-link { color: #89b4fa; text-decoration: none; margin-bottom: 25px; }
        .container { width: 100%; max-width: 600px; }
        
        /* Form occulto por defecto */
        .admin-box {
            background-color: #181825;
            border: 1px solid #cba6f7;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: none; 
        }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input, select { padding: 10px; background-color: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; outline: none; }
        input:focus { border-color: #cba6f7; }
        
        button {
            width: 100%; padding: 12px; background-color: #cba6f7; color: #11111b;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #f5e0dc; }

        .appunti-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .appunto-card {
            background-color: #181825; border: 1px solid #313244; border-radius: 8px;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .download-btn {
            background-color: #313244; color: #cdd6f4; padding: 8px 15px; border-radius: 6px;
            text-decoration: none; font-size: 0.9rem; font-weight: bold; border: 1px solid #45475a; transition: 0.2s;
        }
        .download-btn:hover { background-color: #cba6f7; color: #11111b; border-color: #cba6f7; }
        
        .admin-toggle {
            color: #585b70; font-size: 0.8rem; cursor: pointer; text-decoration: underline; margin-top: 40px;
        }
    </style>
</head>
<body>
    <a href="appunti_scelta.html" class="back-link">← Torna a Sezioni</a>
    <h1>⚡ Appunti del Dio Informatico ⚡</h1>
    <p style="color: #a6adc8; margin-bottom: 30px;">Materiale d'oro colato ad accesso esclusivo.</p>

    <div class="container">
        <div class="admin-box" id="adminBox">
            <h3 style="color: #cba6f7; margin-top:0;">Area di Caricamento Divina</h3>
            <form id="uploadDioForm">
                <div class="form-group">
                    <label>Titolo Appunto</label>
                    <input type="text" id="titolo" placeholder="Es. Algoritmi di Ordinamento Spiegati Bene" required>
                </div>
                <div class="form-group">
                    <label>Materia</label>
                    <select id="materia" required>
                        <option value="Informatica">Informatica</option>
                        <option value="Sistemi">Sistemi</option>
                        <option value="TPSIT">TPSIT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Seleziona il File</label>
                    <input type="file" id="file" required>
                </div>
                <button type="submit">CARICA MATERIALE</button>
            </form>
        </div>

        <div class="appunti-list" id="listaDio">
        </div>

        <div class="admin-toggle" onclick="attivaAdmin()">Sei il Dio Informatico? Accedi per caricare</div>
    </div>

    <script>
        let pinGlobale = null;

        # Configurazione dinamica dell'URL del Backend
        const BASE_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000"
            : "https://server-di-classe-backend.onrender.com";

        function attivaAdmin() {
            const pin = prompt("Inserisci il PIN di autenticazione divina:");
            if (pin) {
                pinGlobale = pin;
                document.getElementById('adminBox').style.display = 'block';
            }
        }

        async function caricaLista() {
            try {
                const risp = await fetch(`${BASE_URL}/lista-appunti`);
                const tutti = await risp.json();
                const container = document.getElementById('listaDio');
                container.innerHTML = '';

                // Filtriamo prendendo SOLO quelli di tipo "dio"
                const appuntiDio = tutti.filter(a => a.tipo === 'dio');

                if(appuntiDio.length === 0) {
                    container.innerHTML = '<p style="color: #a6adc8; text-align: center;">Il Dio non ha ancora depositato il suo sapere per questa settimana.</p>';
                    return;
                }

                appuntiDio.forEach(a => {
                    const card = document.createElement('div');
                    card.className = 'appunto-card';
                    card.innerHTML = `
                        <div>
                            <h4 style="margin:0 0 5px 0; color:#cba6f7;">${a.titolo}</h4>
                            <small style="color:#a6adc8;">Materia: ${a.materia}</small>
                        </div>
                        <a href="${a.file_url}" target="_blank" class="download-btn">Scarica</a>
                    `;
                    container.appendChild(card);
                });
            } catch (errore) {
                console.error("Errore connessione:", errore);
                document.getElementById('listaDio').innerHTML = '<p style="color: #f38ba8; text-align: center;">Impossibile connettersi al database degli appunti.</p>';
            }
        }

        document.getElementById('uploadDioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('titolo', document.getElementById('titolo').value);
            formData.append('materia', document.getElementById('materia').value);
            formData.append('autore', 'Dio Informatico');
            formData.append('tipo', 'dio');
            formData.append('pin', pinGlobale);
            formData.append('file', document.getElementById('file').files[0]);

            try {
                const risp = await fetch(`${BASE_URL}/upload-appunti`, { method: 'POST', body: formData });
                const dati = await risp.json();

                if (dati.stato === "OK") {
                    alert("Sapere caricato nell'iperuranio!");
                    document.getElementById('uploadDioForm').reset();
                    caricaLista();
                } else {
                    alert(dati.messaggio);
                }
            } catch (errore) {
                alert("Errore di caricamento: controlla la connessione al server.");
            }
        });

        caricaLista();
    </script>
</body>
</html>
